<!doctype html><html><head><meta charset="utf-8"><title>GG SDK example</title><style>body{background:#090B10;color:#F3F5F8;font:16px system-ui;display:grid;place-items:center;min-height:100vh}main{border:1px solid #252C38;background:#121620;padding:32px;border-radius:14px;max-width:520px}button{background:#7486FF;color:white;border:0;padding:12px 16px;border-radius:8px}</style></head><body><main><p>SDK V2 EXAMPLE</p><h1>Orbit Run</h1><p id="status">Waiting for a signed launch token.</p><button id="session">Create local session</button></main><script type="module">import{createSDK}from'../src/index.js';const status=document.querySelector('#status'),gg=createSDK({gameId:'orbit-run',parentOrigin:'https://games.example'});gg.init().then(()=>status.textContent='Connected to Gzowo\'s Games').catch(e=>status.textContent=e.message);document.querySelector('#session').onclick=()=>gg.createSession({id:crypto.randomUUID(),maxPlayers:8});</script></body></html>
